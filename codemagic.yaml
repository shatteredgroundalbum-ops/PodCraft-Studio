workflows:
  android-release:
    name: PodCraft Central — Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.19.0
      java: 17
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
      vars:
        PACKAGE_NAME: "com.podcraft.central"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@10

      - name: Install workspace dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web app (Vite)
        script: |
          cd artifacts/podcraft-central
          pnpm run build
        # Output lands in artifacts/podcraft-central/dist/public
        # which matches the webDir in capacitor.config.ts

      - name: Capacitor sync (copy web assets → android)
        script: |
          cd artifacts/podcraft-central
          npx cap sync android

      - name: Set version code from build number
        script: |
          BUILD_NUMBER=${CM_BUILD_NUMBER:-1}
          VERSION_NAME="1.0.${BUILD_NUMBER}"
          sed -i "s/versionCode .*/versionCode ${BUILD_NUMBER}/" \
            artifacts/podcraft-central/android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${VERSION_NAME}\"/" \
            artifacts/podcraft-central/android/app/build.gradle

      - name: Build Android App Bundle (AAB)
        script: |
          cd artifacts/podcraft-central/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

      - name: Build debug APK (for sideloading / testing)
        script: |
          cd artifacts/podcraft-central/android
          ./gradlew assembleDebug

    artifacts:
      # Signed AAB — upload this to Google Play
      - artifacts/podcraft-central/android/app/build/outputs/bundle/release/*.aab
      # Debug APK — sideload directly to device for quick testing
      - artifacts/podcraft-central/android/app/build/outputs/apk/debug/*.apk
      # Build logs
      - artifacts/podcraft-central/android/app/build/reports/**/*

    publishing:
      email:
        recipients:
          - your@email.com           # replace with your email
        notify:
          success: true
          failure: true

      # Uncomment once you have a Google Play app listing:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal             # internal → alpha → beta → production
      #   submit_as_draft: true
